<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Radar UGC</title>
<link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<div class="auth-wrap">
  <a href="/" class="auth-logo"><span class="dot"></span>radar<span class="accent">.</span>ugc</a>

  <div class="auth-card">
    <h1>Entrar</h1>
    <p class="auth-sub">Acesse as vagas do seu painel.</p>

    <form id="formLogin">
      <label for="email">E-mail</label>
      <input type="email" id="email" required placeholder="seu@email.com">

      <label for="senha">Senha</label>
      <input type="password" id="senha" required placeholder="Sua senha">

      <div class="error" id="erroMsg"></div>

      <button type="submit" class="btn-submit" id="btnSubmit">Entrar</button>
    </form>

    <p class="auth-footer">Ainda não tem conta? <a href="/cadastro">Criar conta grátis</a></p>
  </div>
</div>

<script>
  const form = document.getElementById('formLogin');
  const erroMsg = document.getElementById('erroMsg');
  const btnSubmit = document.getElementById('btnSubmit');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    erroMsg.textContent = '';
    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Entrando...';

    try {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          senha: document.getElementById('senha').value
        })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.erro || 'Não foi possível entrar.');
      window.location.href = data.redirect || '/dashboard';
    } catch (err) {
      erroMsg.textContent = err.message;
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
